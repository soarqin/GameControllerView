<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InputView</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div id="header">
            <h1>InputView</h1>
            <div id="status">
                <span id="ws-status" class="status-dot disconnected"></span>
                <span id="ws-text">Disconnected</span>
            </div>
        </div>
        <div id="controller-info">
            <span id="controller-name">No controller detected</span>
        </div>
        <div id="device-container" style="display:none"></div>
        <div id="canvas-container">
            <canvas id="gamepad-canvas" width="500" height="330"></canvas>
        </div>
    </div>
    <script src="constants.js"></script>
    <script src="state.js"></script>
    <script src="websocket.js"></script>
    <script src="config.js"></script>
    <script src="overlay-renderer.js"></script>
    <script src="gamepad-renderer.js"></script>
    <script src="mouse-renderer.js"></script>
    <script src="keyboard-renderer.js"></script>
    <script src="canvas.js"></script>
    <script src="init.js"></script>
</body>
</html>
